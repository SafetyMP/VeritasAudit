name: Publish OCI Container Images to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Package namespace targets
  IMAGE_GATEWAY: ${{ github.repository_owner }}/veritasaudit-gateway
  IMAGE_DASHBOARD: ${{ github.repository_owner }}/veritasaudit-dashboard

jobs:
  build-and-push:
    name: Build & Publish Containers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Set up QEMU for multi-architecture compilations (x86_64 and arm64 support)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx for enhanced cache-mount operations
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GHCR securely using standard workflow secrets
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------
      # 1. METADATA & BUILD: SECURE GATEWAY BACKEND
      # ------------------------------------------
      - name: Extract Secure Gateway Metadata
        id: meta-gateway
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_GATEWAY }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build & Push Secure Gateway Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/secure-gateway/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------
      # 2. METADATA & BUILD: ADMIN DASHBOARD FRONTEND
      # ------------------------------------------
      - name: Extract Admin Dashboard Metadata
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_DASHBOARD }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build & Push Admin Dashboard Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin-dashboard/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
