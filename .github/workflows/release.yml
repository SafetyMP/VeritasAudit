name: Generate GitHub Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  draft-release:
    name: Compile & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Monorepo Workspaces Dependencies
        run: npm ci

      - name: Compile Codebase Workspaces
        run: npm run build

      # ------------------------------------------
      # AUTOMATED PACKAGING OF BUILD ARTIFACTS
      # ------------------------------------------
      - name: Package Release Assets
        run: |
          echo "📦 Packaging compiled distribution assets..."
          
          # Create a temporary staging folder
          mkdir -p fidusgate-dist
          
          # Copy compiled apps & packages
          cp -r apps/secure-gateway/dist fidusgate-dist/gateway-dist
          cp -r apps/admin-dashboard/dist fidusgate-dist/dashboard-dist
          cp -r packages/core-types/dist fidusgate-dist/core-types-dist
          cp -r packages/crypto-utils/dist fidusgate-dist/crypto-utils-dist
          cp -r packages/database/dist fidusgate-dist/database-dist
          cp -r packages/database/data fidusgate-dist/database-seed-data
          
          # Copy governance and config assets
          cp policy.cedar fidusgate-dist/
          cp protect-mcp.config.json fidusgate-dist/
          cp README.md fidusgate-dist/
          cp CLAUDE.md fidusgate-dist/
          cp -r scripts fidusgate-dist/
          
          # Generate compressed archives
          tar -czf fidusgate-release-dist.tar.gz fidusgate-dist
          zip -r fidusgate-release-dist.zip fidusgate-dist
          
          echo "✅ Release packaging complete!"

      # ------------------------------------------
      # TRIGGER AUTOMATED SEMANTIC RELEASE
      # ------------------------------------------
      - name: Semantic Release Action
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
