[package]
name = "cedar-daemon"
version = "0.1.0"
edition = "2021"
description = "High-speed Rust-native Cedar Policy Verifier Daemon for FidusGate"

[dependencies]
tiny_http = "0.12"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
cedar-policy = "3.0"
chrono = { version = "0.4", features = ["serde"] }
