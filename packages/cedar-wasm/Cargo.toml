[package]
name = "cedar-wasm"
version = "1.0.0"
edition = "2021"
description = "WebAssembly bindings for official Rust cedar-policy engine"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
cedar-policy = "3.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
